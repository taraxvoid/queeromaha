---
name: Lint

on: # yamllint disable-line rule:truthy
  pull_request: null

permissions:
  contents: read

jobs:
  fix-lint-issues:
    permissions:
      contents: write
      statuses: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Super-Linter
        uses: super-linter/super-linter@v8.6.0 # x-release-please-version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
          SAVE_SUPER_LINTER_SUMMARY: true
          
          # what do we check for
          VALIDATE_SPELL_CODESPELL: false
          VALIDATE_NATURAL_LANGUAGE: false
          VALIDATE_JSCPD: false
          
          # what do we fix
          FIX_CSS: true
          FIX_MARKDOWN: true
          FIX_SHELL_SHFMT: true
          FIX_BIOME_FORMAT: true
          FIX_BIOME_LINT: true
          FIX_GITHUB_ACTIONS_ZIZMOR: true
          
          # To reuse the same Super-linter configuration that you use in the
          # lint job without duplicating it, see
          # https://github.com/super-linter/super-linter/blob/main/docs/run-linter-locally.md#share-environment-variables-between-environments
      - name: Commit and push linting fixes
        # Run only on:
        # - Pull requests
        # - Not on the default branch
        if: >
          github.event_name == 'pull_request' &&
          github.ref_name != github.event.repository.default_branch
        uses: stefanzweifel/git-auto-commit-action@v7.1.0
        with:
          branch: ${{ github.event.pull_request.head.ref || github.head_ref || github.ref }}
          commit_message: "chore: fix linting issues"
          commit_user_name: super-linter
          commit_user_email: super-linter@super-linter.dev

