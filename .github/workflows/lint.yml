---
name: Lint

on: # yamllint disable-line rule:truthy
  pull_request: null

jobs:
  fix-lint-issues:
    permissions:
      contents: write
      statuses: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Super-Linter
        uses: super-linter/super-linter@35955a2af8395c8224c7072732b91350f7f02c2ae9ee751842776ef29092a6cc
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
          SAVE_SUPER_LINTER_SUMMARY: true
          
          # ignore "spelling" and copypasta check
          VALIDATE_SPELL_CODESPELL: false
          VALIDATE_NATURAL_LANGUAGE: false
          VALIDATE_JSCPD: false
          
          # ignore the "pin action" alert
          VALIDATE_GITHUB_ACTIONS_ZIZMOR: false

          # we use ruff not black
          VALIDATE_PYTHON_BLACK: false
          VALIDATE_PYTHON_RUFF: true
          
          # what do we fix
          FIX_CSS: true
          FIX_MARKDOWN: true
          FIX_SHELL_SHFMT: true
          FIX_BIOME_FORMAT: true
          FIX_BIOME_LINT: true
          FIX_TSX: true
          
          # using biome instead of prettier
          # biome doesnt support yaml or markdown
          FIX_YAML_PRETTIER: true
          FIX_MARKDOWN_PRETTIER: true
          
          FIX_GRAPHQL_PRETTIER: false
          FIX_HTML_PRETTIER: false
          FIX_JAVASCRIPT_PRETTIER: false
          FIX_JSON_PRETTIER: false
          FIX_JSONC_PRETTIER: false
          FIX_JSX_PRETTIER: false
          FIX_TYPESCRIPT_PRETTIER: false
          FIX_VUE_PRETTIER: false
          FIX_CSS_PRETTIER: false
          
          # To reuse the same Super-linter configuration that you use in the
          # lint job without duplicating it, see
          # https://github.com/super-linter/super-linter/blob/main/docs/run-linter-locally.md#share-environment-variables-between-environments
      - name: Commit and push linting fixes
        # Run only on:
        # - Pull requests
        # - Not on the default branch
        if: >
          github.event_name == 'pull_request' &&
          github.ref_name != github.event.repository.default_branch
        uses: stefanzweifel/git-auto-commit-action@v7.1.0
        with:
          branch: ${{ github.event.pull_request.head.ref || github.head_ref || github.ref }}
          commit_message: "chore: fix linting issues"
          commit_user_name: super-linter
          commit_user_email: super-linter@super-linter.dev

