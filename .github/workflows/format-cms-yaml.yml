name: Format CMS YAML

# Decap CMS commits directly to a branch via the git-gateway API (not local
# git), so the husky pre-commit hook never runs for those edits, and its
# own YAML dumper re-wraps/re-quotes the whole file on every save. This
# normalizes the file back to the repo's canonical formatting so the PR
# diff only shows the real change.
on:
  pull_request:
    paths:
      - "src/content/pages/**"

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun scripts/format-yaml.js
      - run: bun run format
      # we skip husky hooks wirh --no-verify
      - name: Commit formatting fixups
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/content/pages
          git commit -m "Normalize CMS YAML formatting" --no-verify
          git push origin HEAD:${{ github.head_ref }} --no-verify
