  - name: The Verdict Bar
    public: true
    description: Hub of industrial and darkwave scene
    links:
      - label: The Slab (2nd Saturdays)
        url: https://www.instagram.com/omaha_goth_and_alternative/
      - label: Industrial Night (3rd Saturdays)
        url: https://www.instagram.com/clubsinthesis
      - label: RAWR XD Emo Nite (Last Saturdays)
        url: https://www.instagram.com/omaha_goth_and_alternative/
      - label: CRYPT - for Elder Goths
        url: https://www.instagram.com/dj_barrens/
      - label: Show Flyers
        url: https://omahaunderground.net/venues/red-light-lounge
    notes: |
      Substance seems to have moved to KY circa summer '26
      Verdict was Rebranded circa late 2025 then apparently back summer '26
      DJ Barrens (Jamie) and sadonaut (Jacob)run Industrial night
        https://www.facebook.com/people/DJ-Barrens/61550865748905/
        https://www.instagram.com/dj_barrens/
      BPM (Austin in Lincoln) DJs often
        https://www.facebook.com/people/BPM-Nebraska/61560865016455/ 
      DJ Nevermore DJs often
        https://www.facebook.com/NevermoreBaltimore
        https://www.instagram.com/dj_nevermore
      DJ Lusterdust runs Slab https://www.facebook.com/people/Luster-Dust/61578897208508/

      Club Noir moved from there to Coven circa spring 2026.
    location:
      neighborhood: Downtown
      street: 1901 Harney St
      google_maps_url: https://maps.app.goo.gl/2bcSF3maPbCxcQ6B8?g_st=ic
    recurring_events:
      - summary: The Slab — Darkwave / Rock / Goth
        rrule: FREQ=MONTHLY;BYDAY=2SA
        dtstart: "20250111"
        time: 21:00
        location: The Verdict (Downtown Omaha)
        description: Goth and darkwave dance party
        url: https://www.instagram.com/slab_goth_night_omaha
      - summary: Industrial Night — EBM / Heavy Beats
