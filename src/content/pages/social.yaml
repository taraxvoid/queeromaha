title: Queer Omaha — LGBTQ+ Community Groups & Resources
description: Community-maintained guide to queer social groups, spiritual spaces, and resources in Omaha, Nebraska.
public: true
items:
  - name: OmahaForUs LGBTQIA* Center
    public: true
    description: Hub of community, resources, and events. Food bank, gender affirming clothing, provider referrals. Quiet/sensory room
    links:
      - label: Events Calendar
        url: https://omahafor.us/events-calendar
      - label: Pantry / Closet
        url: https://omahafor.us/programs/programs-community-support
      - label: Support group (hybrid)
        url: https://forms.office.com/Pages/ResponsePage.aspx?id=9u0lZEHkV06enOibWxjB9G4xeitP3kJGhExliU8hl9lUN1lMVUlWSjFCN0kxUVhRSE9LMFVFN0VBTC4u
      - label: Mental Health Resources
        url: https://omahafor.us/programs/mental-health
      - label: Dedicated Teen / Youth Programs and Space
        url: https://omahafor.us/programs/youth-programs
    location:
      street: 742 N 109th Ct
      city: Omaha
      state: NE
      zip: 68154
      neighborhood: Midtown
      google_maps_url: https://maps.app.goo.gl/jqUnPGEamuFRGZT49
    tags:
      - work-spot
      - neutral-bathrooms
      - seating
    notes: |
      Transition clothing and supplies, Food/hygiene pantry, clothes closet, arts and crafts. Name-change / legal resources. Teen events and groups. Reading room and lending library. Private showers. Volunteering opportunities.
      Support group (19+) every Wednesday evening 6PM to 7:30PM [**Register Here**](https://forms.office.com/Pages/ResponsePage.aspx?id=9u0lZEHkV06enOibWxjB9G4xeitP3kJGhExliU8hl9lUN1lMVUlWSjFCN0kxUVhRSE9LMFVFN0VBTC4u). Outside of Omaha? It's Remote every other week!
      Game night every Thursday evening 5PM to 8PM
      Dungeons & Dragons on the 1st and 3rd Tuesdays evenings  4PM to 7PM
      Dedicated space for [Teen/youth programs](https://www.omahaforus.org/proud-horizons) throughout the week
      Craft Night on Wednesday evening 6PM to 7:30PM
      STI testing certain Thursdays (check schedule)
    recurring_events:
      - summary: Support Group (19+) — OmahaForUs
        rrule: FREQ=WEEKLY;BYDAY=WE
        dtstart: "20250101"
        time: 18:00
        end_time: 19:30
        location: OmahaForUs LGBTQIA* Center
        description: Weekly support group (19+). Registration required. Hybrid — remote every other week.
        url: https://forms.office.com/Pages/ResponsePage.aspx?id=9u0lZEHkV06enOibWxjB9G4xeitP3kJGhExliU8hl9lUN1lMVUlWSjFCN0kxUVhRSE9LMFVFN0VBTC4u
      - summary: Game Night — OmahaForUs
        rrule: FREQ=WEEKLY;BYDAY=TH
        dtstart: "20250101"
        time: 17:00
        end_time: 20:00
        location: OmahaForUs LGBTQIA* Center
        description: Weekly queer game night, pizza provided
        url: https://omahafor.us/events-calendar
      - summary: Dungeons & Dragons — OmahaForUs
        rrule: FREQ=MONTHLY;BYDAY=1TU,3TU
        dtstart: "20250107"
        time: 16:00
        end_time: 19:00
        location: OmahaForUs LGBTQIA* Center
        description: D&D on the 1st and 3rd Tuesdays of each month.
        url: https://omahafor.us/events-calendar
      - summary: Open Volunteering Day — OmahaForUs
        rrule: FREQ=MONTHLY;BYDAY=2FR
        dtstart: "20250107"
        time: 11:00
        end_time: 15:00
        location: OmahaForUs LGBTQIA* Center
        description: Open Monthly volunteer day - Register via the Doodle poll posted on the event page.
        url: https://omahafor.us/events-calendar
