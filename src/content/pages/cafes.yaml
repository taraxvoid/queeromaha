raw: >
  title: Omaha Queer Friendly Cafes

  description: Queer-friendly coffee shops and cafes in Omaha, including queer-owned spots and locations with gender-neutral bathrooms.

  public: true

  items:
    - name: Roast Coffeehouse
      public: true
      description: Great people, coffee and pastries both in Aksarben / 120th and Blondo.
      links:
        - label: Insta
          url: https://www.instagram.com/roast_coffeehouse/
        - label: Website
          url: https://www.ahillofbeans.com/pages/roast-coffeehouse
        - label: FB
          url: https://www.facebook.com/profile.php/?id=100089484920886
      tags:
        - neutral-bathrooms
        - work-spot
      location:
        street: 120th and Blondo
        neighborhood: West O
        google_maps_url: https://maps.app.goo.gl/4qViWqoWxHpZn4oR9
    - name: Godega
      public: true
      description: Grab-and-go food, specialty snacks, and a place to hang out
      links:
        - label: Insta
          url: https://www.instagram.com/godegamarket/
        - label: Website
          url: https://godegamarket.com/
        - label: FB
          url: https://www.facebook.com/GodegaMarket/
      tags:
        - neutral-bathrooms
        - seating
        - work-spot
      location:
        neighborhood: Midtown
    - name: Marigold's
      public: true
      description: Artisanal goods and crafts.
      links:
        - label: Insta
          url: https://www.instagram.com/marigoldsmercantile/
        - label: Website
          url: https://www.marigoldsmercantile.com/
        - label: FB
          url: https://www.facebook.com/marigoldsmercantile/
      tags:
        - neutral-bathrooms
        - seating
      location:
        neighborhood: Midtown
    - name: Mill on Leavenworth
      public: true
      description: Large popular cafe. Good for meetups and "working".
      links:
        - label: Website
          url: https://millcoffee.com/pages/the-mill-on-leavenworth
      tags:
        - seating
        - work-spot
      location:
        neighborhood: Midtown
    - name: Archetype Coffee
      public: true
      description: Best coffee in town. Lil BoHo location serves great brunch food from [Know Good](https://knowgoodeats.com/).
      links:
        - label: Website
          url: https://drinkarchetype.com/
      tags:
        - neutral-bathrooms
        - work-spot
      location:
        neighborhood: Midtown
    - name: Sweet Magnolias
      public: true
      description: Queer-owned pastry shop.
      links:
        - label: Insta
          url: https://www.instagram.com/sweetmagnoliasbakeshop/
        - label: Website
          url: https://www.sweetmagnoliasbakeshop.com/
      location:
        neighborhood: Midtown
    - name: Spielbound
      public: true
      description: Board game cafe with an [active monthly Meetup Group](https://www.meetup.com/playing-games-at-spielbound/).
      links:
        - label: Official Discord
          url: https://discord.com/invite/official-spellbound-861024184947572736
        - label: Website
          url: https://www.spielbound.com/how-to-spielbound
      tags:
        - neutral-bathrooms
      location:
        neighborhood: Midtown
    - name: Hardy Coffee
      public: false
      description: Chill hipster cafe.
      links:
        - label: Insta
          url: https://www.instagram.com/hardycoffeeco/
        - label: FB
          url: https://www.facebook.com/hardycoffeeco/
        - label: Website
          url: https://www.hardycoffee.com/
      notes: RUMINT quality / worker pay concerns
      tags:
        - seating
        - neutral-bathrooms
      location:
        neighborhood: Benson
    - name: Edge of the Universe Cafe
      public: true
      description: Truly unique place with artist owners. Great date spot.
      links:
        - label: Insta
          url: https://www.instagram.com/edgeuniversebff/
        - label: Events Calendar
          url: https://www.edgeoftheuniverseomaha.com/
        - label: FB
          url: https://www.facebook.com/Edgeuniversebff/about/
      tags:
        - neutral-bathrooms
        - seating
      location:
        neighborhood: Benson
    - name: Legends Comics & Coffee
      public: true
      description: Comic shop with a large queer section. Board game space in the back.
      links:
        - label: Insta
          url: https://www.instagram.com/legendcomicsandcoffee/
        - label: FB
          url: https://www.facebook.com/LegendComics/
      tags:
        - neutral-bathrooms
        - seating
      location:
        neighborhood: Benson
    - name: Blue Line Coffee
      public: true
      description: Great coffee and cool people. Posts flyers for local events.
      links:
        - label: Insta
          url: https://www.instagram.com/bluelinecoffeeomaha/
        - label: FB
          url: https://www.facebook.com/pages/Blue-Line-Coffee/140611479308727
      tags:
        - neutral-bathrooms
        - work-spot
      location:
        neighborhood: Midtown
    - name: Lola's
      public: false
      description: Pricy cafe in the movie theater. Good for dates.
      location:
        neighborhood: Midtown
    - name: Amateur Coffee
      public: true
      description: Small place whose takeout coffee comes in glass containers with deposit.
      links:
        - label: Insta
          url: https://www.instagram.com/amateurcoffee/
        - label: Website
          url: https://www.amateurcoffee.com/
        - label: FB
          url: https://www.instagram.com/amateurcoffee/
      tags:
        - neutral-bathrooms
      notes: Met Owner at NZC who stated it's queer owned.
      location:
        neighborhood: Midtown
    - name: Urban Abbey
      public: false
      description: Progressive Methodist cafe / bookstore with a queer section. Chill place to hang out.
      links:
        - label: Website
          url: https://www.urbanabbeyomaha.com/
      notes: idk about xstian stuff man
      tags:
        - seating
      location:
        neighborhood: Midtown
    - name: Reading Room
      public: true
      description: Bookstore cafe / bar with a [Queer-run poetry reading open mic night](https://www.nepoetrysociety.org/spoken-word). See also the [Poetry Menu site ](https://poetrymenu.com/).
      links:
        - label: Insta
          url: https://www.instagram.com/reading_room_omaha/
        - label: Events Calendar
          url: https://readingroomomaha.com/events/
        - label: FB
          url: https://www.facebook.com/p/Reading-Room-Omaha-61576576713461/
      tags:
        - seating
      location:
        neighborhood: Midtown
    - name: Rally Coffee
      public: false
      description: Cafe downtown.
      links:
        - label: Website
          url: https://www.rallycoffee.co/pages/locations
      notes: Go there first before listing.
      location:
        neighborhood: Midtown
    - name: Zen Coffee
      public: true
      description: Downtown and West O locations.
      links:
        - label: Insta
          url: https://www.instagram.com/zencoffeeco/
        - label: FB
          url: https://www.facebook.com/zencoffeecompany/
        - label: Website
          url: https://www.zencoffeecompany.com/
      tags:
        - neutral-bathrooms
        - seating
      location:
        neighborhood: Midtown
    - name: Howlin Hounds
      public: false
      links:
        - label: Insta
          url: https://www.instagram.com/howlinhounds/
      notes: Recommended, haven't been there.
      location:
        neighborhood: Midtown
    - name: Karma Koffee
      public: true
      description: Buddhist themed cafe with vegan options and authentic thangkas.
      links:
        - label: Insta
          url: https://www.instagram.com/karma_koffee/
        - label: Website
          url: https://www.karmakoffee.com/
        - label: FB
          url: https://www.facebook.com/karmakoffeeomaha/
      tags:
        - neutral-bathrooms
        - seating
        - work-spot
      location:
        neighborhood: West O
