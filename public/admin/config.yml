# Use DecapBridge PKCE auth since Netlify Identity was deprecated 2025
backend:
  name: git-gateway
  repo: taraxvoid/queeromaha
  branch: main
  auth_type: pkce
  base_url: https://auth.decapbridge.com
  auth_endpoint: /sites/bc97b76f-9d17-419f-b250-59b5fb34dd05/pkce
  auth_token_endpoint: /sites/bc97b76f-9d17-419f-b250-59b5fb34dd05/token
  gateway_url: https://gateway.decapbridge.com
  commit_messages:
    create: 'Create {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}>'
    update: 'Update {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}>'
    delete: 'Delete {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}>'
    uploadMedia: 'Upload "{{path}}" - {{author-name}} <{{author-login}}>'
    deleteMedia: 'Delete "{{path}}" - {{author-name}} <{{author-login}}>'

auth:
  email_claim: email

site_url: https://queeromaha.net
local_backend: true
media_folder: public/img
public_folder: /img
publish_mode: editorial_workflow

# Reusable field definitions via YAML anchors
_item_fields: &item_fields
  - { label: Name, name: name, widget: string }
  - { label: Public, name: public, widget: boolean, default: true }
  - label: Tags
    name: tags
    widget: select
    multiple: true
    required: false
    options:
      - { label: "🚻 Gender-neutral Bathroom", value: "neutral-bathrooms" }
      - { label: "🛋️ Seating Available", value: "seating" }
      - { label: "💻 Work/Study Spot", value: "work-spot" }
  - { label: Description, name: description, widget: markdown, required: false }
  - label: Links
    name: links
    widget: list
    required: false
    fields:
      - { label: Label, name: label, widget: string }
      - { label: URL, name: url, widget: string }
  - { label: Notes, name: notes, widget: text, required: false }

_directory_fields: &directory_fields
  - { label: Title, name: title, widget: string }
  - { label: Public, name: public, widget: boolean, default: true }
  - label: Items
    name: items
    widget: list
    fields: *item_fields
  - { label: Page Notes, name: notes, widget: text, required: false }

collections:
  - name: pages
    label: Pages
    files:
      - { label: Social, name: social, file: src/content/pages/social.md, fields: *directory_fields }
      - { label: Spiritual, name: spiritual, file: src/content/pages/spiritual.md, fields: *directory_fields }
      - { label: Art, name: art, file: src/content/pages/art.md, fields: *directory_fields }
      - { label: Music, name: music, file: src/content/pages/music.md, fields: *directory_fields }
      - { label: Cafes, name: cafes, file: src/content/pages/cafes.md, fields: *directory_fields }
      - { label: Makers, name: makers, file: src/content/pages/makers.md, fields: *directory_fields }

  - name: simple
    label: Simple Pages
    files:
      - label: About
        name: about
        file: src/content/pages/about.md
        fields:
          - { label: Title, name: title, widget: string }
          - { label: Public, name: public, widget: boolean, default: true }
          - { label: Body, name: body, widget: markdown }
          - { label: Page Notes, name: notes, widget: text, required: false }
      - label: Contact
        name: contact
        file: src/content/pages/contact.md
        fields:
          - { label: Title, name: title, widget: string }
          - { label: Public, name: public, widget: boolean, default: true }
          - { label: Body, name: body, widget: markdown }
          - { label: Page Notes, name: notes, widget: text, required: false }
